# Pre-commit 配置（R9.2 Step Hooks）—— 每次 git commit 自动跑 R5 三关。
#
# 栈：Web-first（ADR-0004）。命令为 pnpm。
#
# ⚠️ 当前为脚手架，尚未生效，需满足以下前置后用 `pre-commit install` 启用：
#   1) 仓库已 `git init`
#   2) 已 `openspec init`（否则 R5 第 1 步标 `Verified: openspec-not-initialized`）
#   3) 已 `pnpm i`，且 package.json 提供 lint / test 脚本
#
# R5 三关：① openspec validate --strict  ② pnpm lint  ③ pnpm test
# 任一失败禁止 commit；修复后重跑；禁止 --no-verify 绕过。

repos:
  - repo: local
    hooks:
      # ① OpenSpec 自检（spec / scenario / tasks 格式）
      - id: openspec-validate
        name: openspec validate (--strict)
        entry: bash -c 'openspec validate "$(cat .openspec-active 2>/dev/null)" --strict'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ② Lint（Web）
      - id: lint
        name: pnpm lint
        entry: pnpm lint
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ③ 单元测试（Web）
      - id: unit-test
        name: pnpm test
        entry: pnpm test
        language: system
        pass_filenames: false
        stages: [pre-commit]

# 备注：若后续追加原生 Android 端，为该端单独增加 hook：
#   ./gradlew ktlintCheck  与  ./gradlew testDebugUnitTest
