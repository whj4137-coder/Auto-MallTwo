<!doctype html>
<html lang="zh-CN"><head>

<link rel="stylesheet" href="ui.css">
<style>

    <main class="main">

      <div class="grid4 rev d1">
        <div class="card ic4"><div class="t">账号信息</div><div class="row"><div class="tile t-mem av"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></div><div><div class="v1">车主用户</div><div class="v2">admin · 138****5678</div></div></div></div>

</div></body></html>
