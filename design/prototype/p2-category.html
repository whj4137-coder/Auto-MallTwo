<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>P2 分类 — Apex Drive Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
<style>
  .catpage{display:flex; gap:16px; height:100%}
  .filter{width:184px; flex:0 0 184px; display:flex; flex-direction:column; gap:6px}
  .filter .f{display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; color:var(--ink2); cursor:pointer; font-size:14px; border:1px solid transparent}
  .filter .f svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7}
  .filter .f.on{background:rgba(34,211,197,.12); color:var(--teal); border-color:var(--line2)}
  .filter .f .c{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink3)}
  .gw{flex:1; min-width:0; display:flex; flex-direction:column; gap:12px}
  .pgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; overflow-y:auto; padding-right:6px}
  .pc{padding:12px; display:flex; flex-direction:column; gap:10px}
  .pc .pic{height:104px; border-radius:11px}
  .pc .pic svg{width:42px;height:42px}
  .pc .nm{font-size:15px;font-weight:600}
  .pc .mt{font-size:11px;color:var(--ink3)}
  .pc .pr{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
  .pc .price{font-size:18px}
</style></head><body>
<div class="device">
  <div class="bar">
    <span class="badge">DEMO</span><span class="brand">APEX <b>DRIVE</b> STORE</span>
    <div class="segs"><div class="seg"><b class="on">驻车</b><i>行车</i></div><div class="seg"><b class="on">在线</b><i>断网</i></div><div class="seg"><b>已登录</b><i class="on">未登录</i></div></div>
    <span class="spacer"></span><span class="readout">STATUS · <em>GUEST</em> / PARKED / ONLINE</span><button class="reset">重置数据</button>
  </div>
  <div class="body">
    <nav class="nav">
      <div class="logo">APEX</div>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></span>首页</a>
      <a class="on"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>分类</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M3 4h2l2.2 11.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 8H6.2"/></svg></span>购物车</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>订单</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>我的</a>
    </nav>
    <main class="main">
      <div class="catpage rev d1">
        <aside class="filter">
          <div class="f on"><svg viewBox="0 0 24 24"><path d="M5 11l1.5-4h11L19 11M5 11h14v5H5z"/></svg>车品<span class="c">03</span></div>
          <div class="f"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="12" rx="2"/><path d="M9 20h6"/></svg>电子配件<span class="c">02</span></div>
          <div class="f"><svg viewBox="0 0 24 24"><path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 20l-4.8 2.5.9-5.4L4.2 8.7l5.4-.8z"/></svg>会员服务<span class="c">02</span></div>
          <div class="f"><svg viewBox="0 0 24 24"><path d="M13 3 5 13h6l-1 8 8-10h-6z"/></svg>充电服务<span class="c">02</span></div>
          <div class="f"><svg viewBox="0 0 24 24"><path d="M4 13c2-5 14-5 16 0M7 13v4h10v-4"/></svg>生活服务<span class="c">01</span></div>
        </aside>
        <section class="gw">
          <div class="sh">车品<span class="more">CAR GOODS · 03</span></div>
          <div class="pgrid">
            <div class="card hov pc"><div class="tile t-car pic"><svg viewBox="0 0 24 24"><rect x="7" y="2.4" width="10" height="19.2" rx="2.6"/><circle cx="12" cy="18.4" r="1.05"/></svg></div><div class="nm">磁吸手机支架</div><div class="mt">曜石黑/银灰</div><div class="pr"><span class="price"><s>¥</s>129</span><span class="pill stock">库存充足</span></div></div>
            <div class="card hov pc"><div class="tile t-car pic"><svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="11" rx="2"/><path d="M7 8V6h10v2"/></svg></div><div class="nm">后备箱折叠收纳箱</div><div class="mt">黑色/深灰</div><div class="pr"><span class="price"><s>¥</s>199</span><span class="pill stock">库存充足</span></div></div>
            <div class="card hov pc"><div class="tile t-car pic"><svg viewBox="0 0 24 24"><path d="M9 3h6v4a4 4 0 0 1-4 4 4 4 0 0 1 4 4v4H9"/></svg></div><div class="nm">车载香氛补充装</div><div class="mt">海盐蓝/森林绿</div><div class="pr"><span class="price"><s>¥</s>89</span><span class="pill stock">库存充足</span></div></div>
          </div>
        </section>
      </div>
    </main>
  </div>
</div></body></html>
