<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Admin 演示会话 — Apex Drive Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
<style>
  .stategrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .scell{padding:16px}.scell .l{font-size:11px;color:var(--ink3)}.scell .v{font-family:var(--mono);font-size:18px;margin-top:6px}
  .scell .v.teal{color:var(--teal)}.scell .v.amber{color:var(--amber)}
</style></head><body>
<div class="device">
  <div class="atop"><span class="badge">DEMO</span><span class="brand">APEX <b>DRIVE</b> STORE · ADMIN</span><span class="who">运营 · <b>admin</b></span></div>
  <div class="body">
    <nav class="anav">
      <div class="grp">CATALOG</div>
      <a><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>商品管理</a>
      <a><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 15l5-4 4 3 5-5 4 3"/></svg>Banner 管理</a>
      <a><svg viewBox="0 0 24 24"><path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 20l-4.8 2.5.9-5.4L4.2 8.7l5.4-.8z"/></svg>服务内容</a>
      <div class="grp">OPS</div>
      <a><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>订单管理</a>
      <a class="on"><svg viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>演示会话</a>
    </nav>
    <main class="acontent">
      <div class="ah rev d1"><h2>演示会话</h2><span class="sp"></span>
        <button class="btn ghost" style="height:36px;padding:0 16px;font-size:13px">重置演示会话</button>
      </div>
      <div class="akpi rev d1">
        <div class="card kpi"><div class="kl">登录状态</div><div class="kv teal">GUEST</div></div>
        <div class="card kpi"><div class="kl">驾驶状态</div><div class="kv">PARKED</div></div>
        <div class="card kpi"><div class="kl">网络状态</div><div class="kv">ONLINE</div></div>
        <div class="card kpi"><div class="kl">会员状态</div><div class="kv amber">INACTIVE</div></div>
      </div>
      <div class="sh rev d1">运行数据<span class="more">RUNTIME</span></div>
      <div class="stategrid rev d1">
        <div class="card scell"><div class="l">购物车数量</div><div class="v">0</div></div>
        <div class="card scell"><div class="l">已勾选</div><div class="v">0</div></div>
        <div class="card scell"><div class="l">Checkout</div><div class="v">NONE</div></div>
        <div class="card scell"><div class="l">订单数量</div><div class="v">0</div></div>
        <div class="card scell"><div class="l">实物序号 seqP</div><div class="v">0</div></div>
        <div class="card scell"><div class="l">会员序号 seqM</div><div class="v">0</div></div>
      </div>
      <div class="sub rev d1" style="margin-top:4px">说明：重置仅清空演示会话数据（购物车/checkout/订单/会员/登录态），不还原 Admin 对商品/Banner/服务的内容编辑。</div>
    </main>
  </div>
</div></body></html>
