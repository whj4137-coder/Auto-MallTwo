<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>P6 购物车 — Apex Drive Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
<style>
  .clist{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:11px;padding-right:6px}
  .crow{display:flex;align-items:center;gap:13px;padding:11px 13px}
  .cb{width:22px;height:22px;border-radius:6px;background:var(--teal);box-shadow:0 0 10px rgba(34,211,197,.4);flex:0 0 22px;position:relative}
  .cb::after{content:"";position:absolute;left:7px;top:3px;width:6px;height:11px;border:solid #06231f;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .crow .th{width:56px;height:56px;flex:0 0 56px}.crow .th svg{width:28px;height:28px}
  .crow .ci{flex:1}.crow .ci .nm{font-size:14px;font-weight:600}.crow .ci .sk{font-size:11px;color:var(--ink3)}
  .crow .price{width:80px;text-align:right;font-size:16px}
  .crow .del{color:var(--ink3);font-size:12px;cursor:pointer}
</style></head><body>
<div class="device">
  <div class="bar">
    <span class="badge">DEMO</span><span class="brand">APEX <b>DRIVE</b> STORE</span>
    <div class="segs"><div class="seg"><b class="on">驻车</b><i>行车</i></div><div class="seg"><b class="on">在线</b><i>断网</i></div><div class="seg"><b class="on">已登录</b><i>未登录</i></div></div>
    <span class="spacer"></span><span class="readout">STATUS · <em>ADMIN</em> / PARKED / ONLINE · CART 2</span><button class="reset">重置数据</button>
  </div>
  <div class="body">
    <nav class="nav">
      <div class="logo">APEX</div>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></span>首页</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>分类</a>
      <a class="on"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M3 4h2l2.2 11.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 8H6.2"/></svg></span>购物车</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>订单</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>我的</a>
    </nav>
    <main class="main">
      <div class="phead rev d1"><span class="ptitle">购物车</span></div>
      <div class="ls rev d1">
        <div class="left">
          <div class="clist">
            <div class="card crow"><span class="cb"></span><div class="tile t-car th"><svg viewBox="0 0 24 24"><rect x="7" y="2.4" width="10" height="19.2" rx="2.6"/><circle cx="12" cy="18.4" r="1.05"/></svg></div><div class="ci"><div class="nm">磁吸手机支架</div><div class="sk">曜石黑</div></div><div class="stepper"><button class="dim">−</button><span class="n">1</span><button>＋</button></div><span class="price"><s>¥</s>129</span><span class="del">删除</span></div>
            <div class="card crow"><span class="cb"></span><div class="tile t-ele th"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="3"/></svg></div><div class="ci"><div class="nm">行车记录仪 Mini</div><div class="sk">黑色 · 128G</div></div><div class="stepper"><button>−</button><span class="n">2</span><button>＋</button></div><span class="price"><s>¥</s>998</span><span class="del">删除</span></div>
          </div>
        </div>
        <aside class="right"><div class="card summary">
          <h3>订单摘要</h3>
          <div class="sline"><span>商品合计</span><span class="v">¥1127</span></div>
          <div class="sline"><span>配送方式</span><span class="v">标准配送</span></div>
          <div class="sline"><span>收货地址</span><span class="v">张先生 · 上海浦东…</span></div>
          <div class="stotal"><span>合计</span><span class="price"><s>¥</s>1127</span></div>
          <button class="btn lg block">前往结算</button>
        </div></aside>
      </div>
    </main>
  </div>
</div></body></html>
