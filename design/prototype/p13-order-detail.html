<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>P13 订单详情 — Apex Drive Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
<style>
  .wrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:6px}
  .blkc{padding:15px}.blkc .t{font-size:11px;color:var(--ink3);margin-bottom:10px}
  .kv{display:flex;justify-content:space-between;font-size:14px;padding:6px 0}.kv .k{color:var(--ink3)} .kv .mono{font-family:var(--mono)}
  .it{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--line)}
  .it .th{width:46px;height:46px;flex:0 0 46px}.it .th svg{width:23px;height:23px}.it .nm{flex:1;font-size:14px}.it .sk{font-size:11px;color:var(--ink3)}
  .tot{display:flex;justify-content:space-between;align-items:baseline;padding-top:11px}.tot .price{font-size:22px}
</style></head><body>
<div class="device">
  <div class="bar">
    <span class="badge">DEMO</span><span class="brand">APEX <b>DRIVE</b> STORE</span>
    <div class="segs"><div class="seg"><b class="on">驻车</b><i>行车</i></div><div class="seg"><b class="on">在线</b><i>断网</i></div><div class="seg"><b class="on">已登录</b><i>未登录</i></div></div>
    <span class="spacer"></span><span class="readout">STATUS · <em>ADMIN</em> / PARKED / ONLINE</span><button class="reset">重置数据</button>
  </div>
  <div class="body">
    <nav class="nav">
      <div class="logo">APEX</div>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></span>首页</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>分类</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M3 4h2l2.2 11.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 8H6.2"/></svg></span>购物车</a>
      <a class="on"><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>订单</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>我的</a>
    </nav>
    <main class="main">
      <div class="phead rev d1"><span class="back">‹ 返回</span><span class="ptitle">订单详情</span></div>
      <div class="wrap rev d1">
        <div class="card blkc"><div class="t">订单信息</div>
          <div class="kv"><span class="k">订单号</span><span class="mono">ORDER-P-001</span></div>
          <div class="kv"><span class="k">状态</span><span class="badge-ok">已支付</span></div>
          <div class="kv"><span class="k">下单时间</span><span class="mono">2026-05-29 10:05</span></div>
          <div class="kv"><span class="k">支付方式</span><span>演示支付（模拟扫码）</span></div>
        </div>
        <div class="card blkc"><div class="t">商品清单</div>
          <div class="it"><div class="tile t-car th"><svg viewBox="0 0 24 24"><rect x="7" y="2.4" width="10" height="19.2" rx="2.6"/><circle cx="12" cy="18.4" r="1.05"/></svg></div><div class="nm">磁吸手机支架<div class="sk">曜石黑 ×1</div></div><span class="price"><s>¥</s>129</span></div>
          <div class="tot"><span>合计</span><span class="price"><s>¥</s>129</span></div>
        </div>
        <div class="card blkc"><div class="t">收货信息</div>
          <div class="kv"><span class="k">收件人</span><span>张先生 · 138****5678</span></div>
          <div class="kv"><span class="k">地址</span><span>上海浦东新区张江中科路1730号</span></div>
        </div>
      </div>
    </main>
  </div>
</div></body></html>
