<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>P7 确认订单 — Apex Drive Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
<style>
  .left{gap:12px}.left .blkc{padding:14px}
  .blkc .t{font-size:11px;color:var(--ink3);margin-bottom:9px}
  .name{font-size:14px;font-weight:600}.det{font-size:13px;color:var(--ink2);margin-top:4px}
  .it{display:flex;align-items:center;gap:12px;padding:6px 0}

<div class="device">

    <span class="badge">DEMO</span><span class="brand">APEX <b>DRIVE</b> STORE</span>

    <span class="spacer"></span><span class="readout">STATUS · <em>ADMIN</em> / PARKED / ONLINE</span><button class="reset">重置数据</button>
  </div>
  <div class="body">
    <nav class="nav">
      <div class="logo">APEX</div>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></span>首页</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>分类</a>
      <a class="on"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M3 4h2l2.2 11.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 8H6.2"/></svg></span>购物车</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>订单</a>
      <a><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>我的</a>
    </nav>
    <main class="main">
      <div class="phead rev d1"><span class="ptitle">确认订单</span></div>
      <div class="ls rev d1">
        <div class="left">
          <div class="card blkc"><div class="t">收货信息</div><div class="name">张先生　138****5678</div><div class="det">上海浦东新区张江中科路1730号 · 默认地址</div></div>
          <div class="card blkc"><div class="t">商品清单</div><div class="it"><div class="tile t-car th"><svg viewBox="0 0 24 24"><rect x="7" y="2.4" width="10" height="19.2" rx="2.6"/><circle cx="12" cy="18.4" r="1.05"/></svg></div><div class="nm">磁吸手机支架 <span style="color:var(--ink3);font-size:12px">曜石黑</span></div><div class="qp">×1<br><span class="price"><s>¥</s>129</span></div></div></div>
          <div class="card blkc"><div class="t">配送说明</div><div class="det">标准配送 · 预计 2-3 个工作日送达（演示）</div></div>
        </div>
        <aside class="right"><div class="card summary">
          <h3>支付摘要</h3>
          <div class="sline"><span>商品金额</span><span class="v">¥129</span></div>
          <div class="sline"><span>运费</span><span class="v">¥0</span></div>
          <div class="stotal"><span>合计</span><span class="price"><s>¥</s>129</span></div>
          <button class="btn lg block">去支付</button>
        </div></aside>
      </div>
    </main>
  </div>
</div></body></html>
